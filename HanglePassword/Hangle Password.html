<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Secure Password Input</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 50px;
            background-color: #f5f5f5;
        }

        .password-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        /* 보안 입력 컨트롤 핵심 CSS */
        .secure-universal-input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 18px;
            font-family: Consolas, monospace; /* 폭을 일정하게 유지 */
            border: 1px solid #ccc;
            border-radius: 4px;
            /* 1. 글자를 동그라미로 마스킹 */
            -webkit-text-security: disc;
            /* 2. 드래그 블록 지정 방지 */
            user-select: none;
            -moz-user-select: none;
            /* 3. 다국어 IME 강제 활성화 (구형 브라우저 지원용) */
            ime-mode: active;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #0078D7;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

            .submit-btn:hover {
                background-color: #005a9e;
            }

        #resultLog {
            margin-top: 15px;
            word-break: break-all;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="password-container">
        <h3>다국어 지원 보안 패스워드</h3>
        <p style="font-size: 12px; color: #666;">한글, 영문, 특수문자 모두 입력 가능합니다.</p>

        <input type="text" id="unicodePwd" class="secure-universal-input" autocomplete="off" spellcheck="false" placeholder="비밀번호 입력" />

        <button id="submitBtn" class="submit-btn">안전하게 서버로 전송</button>

        <div id="resultLog"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pwdInput = document.getElementById('unicodePwd');
            const submitBtn = document.getElementById('submitBtn');
            const resultLog = document.getElementById('resultLog');

            // 1. 클립보드 및 우클릭 이벤트 원천 차단
            pwdInput.addEventListener('copy', (e) => e.preventDefault());
            pwdInput.addEventListener('paste', (e) => e.preventDefault());
            pwdInput.addEventListener('cut', (e) => e.preventDefault());
            pwdInput.addEventListener('contextmenu', (e) => e.preventDefault());

            // 2. 전송 버튼 클릭 시 로직
            submitBtn.addEventListener('click', async () => {
                const rawPassword = pwdInput.value;
                if (!rawPassword) {
                    alert("비밀번호를 입력해주세요.");
                    return;
                }

                // [보안 핵심] 추출 즉시 DOM의 평문을 날려버림 (콘솔 해킹/메모리 덤프 방어)
                pwdInput.value = "";

                // 3. 클라이언트 사이드 해싱 (Web Crypto API - SHA-256)
                // 서버로 평문이 넘어가지 않도록 브라우저 단에서 즉시 해시 변환
                const encoder = new TextEncoder();
                const data = encoder.encode(rawPassword);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);

                // ArrayBuffer를 Hex 문자열로 변환
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashedHexPassword = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                // 결과 출력 (실제 서비스에서는 이 해시값을 Fetch/AJAX로 서버에 전송)
                resultLog.innerHTML = `<strong>(테스트용 출력) 서버로 전송될 해시값:</strong><br/>${hashedHexPassword}`;
            });

            // 엔터키 입력 지원
            pwdInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitBtn.click();
            });
        });
    </script>
</body>
</html>
